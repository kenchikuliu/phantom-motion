<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Phantom Deck - Neo-Grid Dark</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<svg width="0" height="0" style="position:absolute;z-index:-1;">
  <defs>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>

<div class="phantom-deck">
    
    <!-- Slide 1: Title -->
    <div class="phantom-slide">
        <div class="glass-panel" style="text-align: center;">
            <h1 class="slide-title">CYBERPUNK DATA</h1>
            <p class="slide-subtitle">The Future of Interactive Visual Narratives</p>
        </div>
    </div>

    <!-- Slide 2: 2D Line Chart (D3) -->
    <div class="phantom-slide">
        <h2 class="slide-heading">REVENUE TRAJECTORY</h2>
        <div class="chart-container glass-panel" id="chart-revenue" style="width: 800px; height: 400px; position: relative;"></div>
    </div>

    <!-- Slide 3: 3D Bar Chart (Three.js) -->
    <div class="phantom-slide">
        <!-- The 3D container is absolutely positioned behind the content -->
        <div class="chart-container-3d" id="chart-3d-bars" style="width: 100vw; height: 100vh; position: absolute; top:0; left:0; z-index:-1;"></div>
        <div class="glass-panel" style="position: absolute; bottom: 10%; left: 10%;">
            <h2 class="slide-heading">GLOBAL DISTRIBUTION</h2>
            <p class="slide-text">Physical nodes represented in 3D WebGL space.</p>
        </div>
    </div>

</div>

<!-- GSAP Animations Configuration -->
<script>
window.slideAnimations = window.slideAnimations || {};

// Slide 0: Title Animation
window.slideAnimations[0] = {
    create: function() {
        const tl = gsap.timeline();
        tl.from(".slide-title", { y: 50, opacity: 0, duration: 1, ease: "power3.out" })
          .from(".slide-subtitle", { y: 20, opacity: 0, duration: 1, ease: "power2.out" }, "-=0.5");
        return tl;
    }
};

// Slide 1: D3 Line Chart Animation
window.slideAnimations[1] = {
    create: function() {
        const tl = gsap.timeline();
        const data = [10, 25, 40, 20, 60, 45, 90, 80, 110];
        const container = document.getElementById('chart-revenue');
        if(!container) return tl;
        container.innerHTML = ''; 
        
        const width = 800, height = 400;
        const margin = {top: 20, right: 20, bottom: 30, left: 40};
        const innerWidth = width - margin.left - margin.right;
        const innerHeight = height - margin.top - margin.bottom;
        
        const x = d3.scaleLinear().domain([0, data.length - 1]).range([0, innerWidth]);
        const y = d3.scaleLinear().domain([0, d3.max(data)]).range([innerHeight, 0]);
        
        const lineGen = d3.line().x((d, i) => x(i)).y(d => y(d)).curve(d3.curveCatmullRom.alpha(0.5));
        const areaGen = d3.area().x((d, i) => x(i)).y0(innerHeight).y1(d => y(d)).curve(d3.curveCatmullRom.alpha(0.5));
            
        const svg = d3.select(container).append("svg").attr("width", width).attr("height", height).append("g").attr("transform", `translate(${margin.left},${margin.top})`);
            
        const defs = svg.append("defs");
        const gradient = defs.append("linearGradient").attr("id", "area-grad").attr("x1", "0%").attr("y1", "0%").attr("x2", "0%").attr("y2", "100%");
        gradient.append("stop").attr("offset", "0%").attr("stop-color", "var(--accent-cyan)").attr("stop-opacity", 0.5);
        gradient.append("stop").attr("offset", "100%").attr("stop-color", "var(--accent-cyan)").attr("stop-opacity", 0);
            
        const areaPath = svg.append("path").datum(data).attr("class", "chart-area").attr("fill", "url(#area-grad)").attr("d", areaGen).attr("opacity", 0);
        const linePath = svg.append("path").datum(data).attr("class", "chart-line").attr("fill", "none").attr("stroke", "var(--accent-cyan)").attr("stroke-width", 4).attr("filter", "url(#neon-glow)").attr("d", lineGen);
            
        const totalLength = linePath.node().getTotalLength();
        linePath.attr("stroke-dasharray", totalLength).attr("stroke-dashoffset", totalLength);
                
        tl.to(linePath.node(), { strokeDashoffset: 0, duration: 2.5, ease: "power3.inOut" });
        tl.to(areaPath.node(), { opacity: 1, duration: 1.5, ease: "power2.out" }, "-=1.0");
        
        return tl;
    }
};

// Slide 2: Three.js 3D Bar Chart Animation
window.slideAnimations[2] = {
    create: function() {
        const tl = gsap.timeline();
        const container = document.getElementById('chart-3d-bars');
        if(!container) return tl;
        container.innerHTML = ''; 
        
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.05);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.set(0, 10, 30);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);
        
        scene.add(new THREE.AmbientLight(0xffffff, 0.2));
        const pointLight = new THREE.PointLight(0x00f0ff, 2, 50);
        pointLight.position.set(0, 15, 10);
        scene.add(pointLight);
        
        const data = [15, 30, 10, 45, 20];
        const spacing = 4;
        const startX = -((data.length - 1) * spacing) / 2;
        
        const material = new THREE.MeshStandardMaterial({ color: 0x00f0ff, emissive: 0x00f0ff, emissiveIntensity: 0.5, roughness: 0.2, metalness: 0.8 });
        const bars = [];
        
        data.forEach((val, i) => {
            const geometry = new THREE.BoxGeometry(1.5, 0.1, 1.5);
            const bar = new THREE.Mesh(geometry, material);
            bar.position.set(startX + i * spacing, 0, 0);
            scene.add(bar);
            bars.push({ mesh: bar, targetHeight: val });
        });
        
        const gridHelper = new THREE.GridHelper(50, 50, 0x00f0ff, 0x222222);
        gridHelper.position.y = -0.05;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.2;
        scene.add(gridHelper);
        
        const animProps = data.map(() => ({ scaleY: 0.01 }));
        
        bars.forEach((barObj, i) => {
            tl.to(animProps[i], {
                scaleY: barObj.targetHeight, duration: 2, ease: "elastic.out(1, 0.5)",
                onUpdate: () => {
                    barObj.mesh.scale.y = animProps[i].scaleY * 10;
                    barObj.mesh.position.y = (0.1 * animProps[i].scaleY * 10) / 2;
                }
            }, i * 0.15);
        });
        
        tl.to(camera.position, { x: 20, z: 20, duration: 8, ease: "power1.inOut" }, 0);
        tl.to(camera, { onUpdate: () => { camera.lookAt(0,0,0); } }, 0);
        
        const renderLoop = () => { renderer.render(scene, camera); };
        gsap.ticker.add(renderLoop);
        
        tl.eventCallback("onComplete", () => {}); // Can cleanup ticker here if needed
        
        return tl;
    }
};

</script>

</body>
</html>
